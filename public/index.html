<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flow & Bars</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style id="design-vars">
:root{
  --red:#FF2D55;--red2:#cc1f42;
  --cyan:#00D4FF;--gold:#FFD700;--orange:#FF6B2B;--purple:#B44FFF;
  --green:#00FF87;
  --bg:#070707;--bg2:#0d0d0d;--bg3:#111;--bg4:#161616;--bg5:#1c1c1c;
  --border:#222;--border2:#2a2a2a;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --font-display:'Bebas Neue',cursive;
  --font-ui:'Rajdhani',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:15px;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}
a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:var(--font-ui)}input,select,textarea{font-family:var(--font-ui)}

@keyframes rainbow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,85,.6)}70%{box-shadow:0 0 0 8px rgba(255,45,85,0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes designGlow{0%,100%{box-shadow:0 0 0 2px rgba(255,215,0,.4)}50%{box-shadow:0 0 0 3px rgba(255,215,0,.9),0 0 16px rgba(255,215,0,.3)}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.admin-badge{background:linear-gradient(90deg,#f00,#f70,#ff0,#0f0,#00f,#8b00ff,#f00);background-size:400% 400%;animation:rainbow 2s linear infinite;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#fff;-webkit-text-fill-color:#fff;letter-spacing:1px;box-shadow:0 0 12px rgba(255,200,100,.5)}
.mod-badge{background:#FF6B2B;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#fff;letter-spacing:1px}
.designer-badge{background:#B44FFF;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#fff;letter-spacing:1px}
.judge-badge{background:#FFD700;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#000;letter-spacing:1px}
.battler-badge{background:var(--red);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#fff;letter-spacing:1px}
.user-badge-r{background:var(--cyan);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#000;letter-spacing:1px}

#app{min-height:100vh;display:flex;flex-direction:column}
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(7,7,7,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);height:60px;display:flex;align-items:center;padding:0 20px;gap:12px}
.nav-logo{font-family:var(--font-display);font-size:28px;letter-spacing:2px;background:linear-gradient(135deg,var(--red),#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;cursor:pointer;flex-shrink:0}
.nav-links{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;color:var(--text2);font-family:var(--font-ui);font-size:13px;font-weight:600;padding:6px 10px;border-radius:4px;transition:all .2s;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.nav-btn:hover,.nav-btn.active{color:var(--text);background:var(--bg4)}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-btn{background:var(--bg4);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;letter-spacing:1px;transition:all .2s}
.lang-btn:hover{border-color:var(--red);color:var(--red)}
.btn-primary{background:var(--red);border:none;color:#fff;font-family:var(--font-ui);font-size:13px;font-weight:700;padding:8px 18px;border-radius:4px;letter-spacing:.5px;transition:all .2s;text-transform:uppercase}
.btn-primary:hover{background:var(--red2);transform:translateY(-1px)}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text2);font-family:var(--font-ui);font-size:13px;font-weight:600;padding:8px 18px;border-radius:4px;letter-spacing:.5px;transition:all .2s;text-transform:uppercase}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:5px 12px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn-danger{background:#c0392b;border:none;color:#fff;font-family:var(--font-ui);font-size:13px;font-weight:700;padding:8px 18px;border-radius:4px;transition:all .2s;text-transform:uppercase}
.btn-danger:hover{background:#a93226}
.btn-success{background:#27ae60;border:none;color:#fff;font-family:var(--font-ui);font-size:13px;font-weight:700;padding:8px 18px;border-radius:4px;transition:all .2s}
.btn-gold{background:var(--gold);border:none;color:#000;font-family:var(--font-ui);font-size:13px;font-weight:700;padding:8px 18px;border-radius:4px;transition:all .2s}

main{flex:1;padding-top:60px}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.page{animation:fadeIn .3s ease}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.input-field{background:var(--bg4);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:10px 14px;border-radius:6px;width:100%;transition:border-color .2s;outline:none}
.input-field:focus{border-color:var(--red)}
.input-field::placeholder{color:var(--text3)}
select.input-field option{background:var(--bg4)}
label{display:block;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.form-group{margin-bottom:16px}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.section-header h2{font-family:var(--font-display);font-size:32px;letter-spacing:2px}
.accent-bar{width:4px;height:32px;background:var(--red);border-radius:2px;flex-shrink:0}
.live-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;animation:livePulse 1.5s infinite}
.upcoming-badge{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:1px;text-transform:uppercase}
.finished-badge{background:var(--bg5);color:var(--text3);font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;letter-spacing:1px;text-transform:uppercase}
.divider{height:1px;background:var(--border);margin:20px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:28px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;animation:slideDown .3s}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;color:var(--text3);font-family:var(--font-ui);font-size:13px;font-weight:600;padding:10px 16px;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.tab.active{color:var(--red);border-bottom-color:var(--red)}.tab:hover{color:var(--text)}
.stat-box{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.stat-num{font-family:var(--font-display);font-size:40px;letter-spacing:1px;line-height:1}
.stat-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
table{width:100%;border-collapse:collapse}
th{background:var(--bg4);color:var(--text2);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex-center{display:flex;align-items:center}
.gap-8{gap:8px}.gap-12{gap:12px}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
.scroll-x{overflow-x:auto;scrollbar-width:thin}
.search-box{position:relative}.search-box .input-field{padding-left:36px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state h3{font-family:var(--font-display);font-size:28px;letter-spacing:2px;margin-bottom:8px;color:var(--text2)}

.hero{position:relative;background:linear-gradient(180deg,#0a0a0a 0%,var(--bg) 100%);padding:60px 0;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,45,85,.08),transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(0,212,255,.05),transparent 60%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.hero-title{font-family:var(--font-display);font-size:72px;line-height:.95;letter-spacing:3px;text-transform:uppercase}
.hero-sub{color:var(--text2);font-size:16px;margin-top:16px;line-height:1.6}
.hero-actions{display:flex;gap:12px;margin-top:28px}
.stats-bar{background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:16px 0;margin-bottom:48px}
.stats-bar-inner{display:flex;justify-content:space-around;align-items:center}
.stat-item{text-align:center}
.stat-item .num{font-family:var(--font-display);font-size:28px;color:var(--red)}
.stat-item .lbl{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.battle-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .25s}
.battle-card:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,45,85,.1)}
.battle-card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.battle-vs{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:16px}
.rapper-side{text-align:center}
.rapper-avatar{width:60px;height:60px;border-radius:50%;background:var(--bg5);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 8px}
.rapper-name{font-family:var(--font-display);font-size:18px;letter-spacing:1px}
.vs-text{font-family:var(--font-display);font-size:28px;color:var(--text3);letter-spacing:2px}
.vote-bar-wrap{padding:0 16px 14px}
.vote-bar{height:6px;background:var(--bg5);border-radius:3px;overflow:hidden;display:flex}
.vote-bar-a{background:var(--red);transition:width .5s}.vote-bar-b{background:var(--cyan);transition:width .5s}
.vote-pct{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-bottom:6px}
.rapper-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:20px;cursor:pointer;transition:all .25s;text-align:center}
.rapper-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.rapper-big-avatar{width:80px;height:80px;border-radius:50%;background:var(--bg5);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px}
.rapper-stats-row{display:flex;justify-content:center;gap:16px;margin-top:12px}
.mini-stat{text-align:center}.mini-stat .v{font-family:var(--font-display);font-size:20px}.mini-stat .l{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.news-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .25s}
.news-card:hover{border-color:var(--border2)}
.news-img{height:160px;background:linear-gradient(135deg,#1a0a0e,#0a0a1a);display:flex;align-items:center;justify-content:center;font-size:40px}
.news-body{padding:16px}
.news-cat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.news-title{font-family:var(--font-display);font-size:20px;letter-spacing:1px;line-height:1.2;margin-bottom:8px}
.news-excerpt{font-size:13px;color:var(--text2);line-height:1.5}
.news-meta{font-size:11px;color:var(--text3);margin-top:10px;display:flex;gap:8px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:40px}
.podium-item{text-align:center;flex:1;max-width:160px}
.podium-block{border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:16px 8px;cursor:pointer;transition:opacity .2s}
.podium-block:hover{opacity:.85}
.p1{background:linear-gradient(180deg,rgba(255,215,0,.2),rgba(255,215,0,.05));border:1px solid rgba(255,215,0,.4);height:120px}
.p2{background:linear-gradient(180deg,rgba(192,192,192,.15),rgba(192,192,192,.03));border:1px solid rgba(192,192,192,.3);height:90px}
.p3{background:linear-gradient(180deg,rgba(205,127,50,.15),rgba(205,127,50,.03));border:1px solid rgba(205,127,50,.3);height:70px}
.podium-name{font-family:var(--font-display);font-size:14px;letter-spacing:1px;margin-top:10px}
.podium-pts{font-family:var(--font-mono);font-size:12px;color:var(--text2)}
.chat-wrap{display:grid;grid-template-columns:1fr 280px;gap:20px;height:calc(100vh - 140px)}
.chat-main{display:flex;flex-direction:column;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{display:flex;gap:10px;align-items:flex-start;animation:slideDown .2s}
.chat-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg5);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.chat-content{flex:1}
.chat-author{font-size:12px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.chat-text{font-size:13px;color:var(--text);background:var(--bg4);padding:8px 12px;border-radius:0 8px 8px 8px;display:inline-block;max-width:100%;line-height:1.5}
.chat-time{font-size:10px;color:var(--text3);margin-top:3px}
.chat-input-row{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.online-list{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px}
.online-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.online-item:last-child{border-bottom:none}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:pulse 1.4s infinite;display:inline-block}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
.admin-header{position:relative;padding:28px 0;margin-bottom:0;background:linear-gradient(135deg,#0d0309,#07070d)}
.admin-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#f00,#f70,#ff0,#0f0,#00f,#8b00ff,#f00);background-size:400% 100%;animation:rainbow 2s linear infinite}
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.profile-header{background:linear-gradient(180deg,var(--bg3),var(--bg));border:1px solid var(--border);border-radius:12px;padding:32px;display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;margin-bottom:24px}
.profile-avatar{width:100px;height:100px;border-radius:50%;background:var(--bg5);border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:40px}
footer{background:var(--bg3);border-top:1px solid var(--border);padding:32px 0;margin-top:60px}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-logo{font-family:var(--font-display);font-size:24px;color:var(--text3)}
.footer-link{color:var(--text3);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:color .2s}
.footer-link:hover{color:var(--red)}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--bg5);border:1px solid var(--border);border-radius:12px;transition:.3s}
.slider::before{content:'';position:absolute;width:18px;height:18px;bottom:2px;left:2px;background:var(--text3);border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:rgba(255,45,85,.3);border-color:var(--red)}
.toggle input:checked+.slider::before{transform:translateX(20px);background:var(--red)}
.maintenance{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.maintenance h1{font-family:var(--font-display);font-size:60px;letter-spacing:4px;color:var(--red)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── DESIGN MODE ─────────────────────────────────────────────── */
body.design-mode [data-editable]{outline:1px dashed rgba(255,215,0,.35);cursor:text;transition:outline .2s}
body.design-mode [data-editable]:hover{outline:2px solid var(--gold);animation:designGlow 2s infinite}
body.design-mode [data-editable]:focus{outline:2px solid var(--gold);background:rgba(255,215,0,.04);box-shadow:0 0 0 4px rgba(255,215,0,.1)}

.design-fab{position:fixed;bottom:24px;right:24px;z-index:3000;background:linear-gradient(135deg,#1a0a00,#0a001a);border:2px solid var(--gold);color:var(--gold);font-family:var(--font-ui);font-size:13px;font-weight:700;padding:10px 18px;border-radius:50px;cursor:pointer;letter-spacing:1px;transition:all .25s;box-shadow:0 4px 20px rgba(255,215,0,.2)}
.design-fab:hover,.design-fab.active{background:var(--gold);color:#000;box-shadow:0 4px 30px rgba(255,215,0,.5)}
.design-fab.active{animation:none}

.design-panel{position:fixed;top:60px;right:0;bottom:0;width:320px;background:rgba(10,8,15,.97);border-left:1px solid rgba(255,215,0,.3);z-index:2500;display:flex;flex-direction:column;animation:slideInRight .3s;backdrop-filter:blur(12px);overflow:hidden}
.design-panel-header{padding:16px;border-bottom:1px solid rgba(255,215,0,.2);display:flex;align-items:center;justify-content:space-between}
.design-panel-title{font-family:var(--font-display);font-size:20px;letterSpacing:2px;color:var(--gold)}
.design-panel-body{flex:1;overflow-y:auto;padding:16px}
.design-panel-body::-webkit-scrollbar{width:3px}
.design-panel-body::-webkit-scrollbar-thumb{background:var(--gold)}
.design-section{margin-bottom:20px}
.design-section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(255,215,0,.15)}
.design-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.design-label{font-size:12px;color:var(--text2)}
.color-input-wrap{position:relative;width:40px;height:28px;border-radius:4px;overflow:hidden;border:1px solid var(--border2);cursor:pointer}
.color-input-wrap input[type=color]{position:absolute;inset:-4px;width:calc(100%+8px);height:calc(100%+8px);border:none;padding:0;cursor:pointer;opacity:0}
.color-swatch{position:absolute;inset:0;border-radius:3px;pointer-events:none}

// ─── API HELPERS ─────────────────────────────────────────────────────────────
function getToken(){return localStorage.getItem('fb_token');}
function setToken(t){if(t)localStorage.setItem('fb_token',t);else localStorage.removeItem('fb_token');}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  const token=getToken();
  if(token) opts.headers['Authorization']='Bearer '+token;
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(API+'/api'+path,opts);
  const data=await r.json();
  if(!r.ok) throw new Error(data.error||'Request failed');
  return data;
}
const GET=(path)=>api('GET',path);
const POST=(path,body)=>api('POST',path,body);
const PUT=(path,body)=>api('PUT',path,body);
const DEL=(path)=>api('DELETE',path);

// ─── DESIGN MODE PANEL ───────────────────────────────────────────────────────
function DesignPanel({t,onClose,onSave}){
  const [tab,setTab]=useState('colors');
  const [cfg,setCfg]=useState(null);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  useEffect(()=>{
    GET('/design').then(d=>{
      setCfg(d);
      applyDesign(d);
    }).catch(()=>{});
  },[]);

  function applyDesign(d){
    if(!d||!d.colors) return;
    const s=document.getElementById('design-vars');
    if(s) s.textContent=`:root{--red:${d.colors.primary||'#FF2D55'};--red2:${d.colors.primary||'#FF2D55'};--cyan:${d.colors.accent||'#00D4FF'};--gold:${d.colors.gold||'#FFD700'};--bg:${d.colors.bg||'#070707'};--text:${d.colors.text||'#e8e8e8'};--bg2:#0d0d0d;--bg3:#111;--bg4:#161616;--bg5:#1c1c1c;--border:#222;--border2:#2a2a2a;--text2:#aaa;--text3:#666;--orange:#FF6B2B;--purple:#B44FFF;--green:#00FF87;--font-display:'Bebas Neue',cursive;--font-ui:'Rajdhani',sans-serif;--font-mono:'Share Tech Mono',monospace;}${d.customCSS||''}`;
    if(d.customCSS){const el=document.getElementById('custom-css')||Object.assign(document.createElement('style'),{id:'custom-css'});el.textContent=d.customCSS;if(!el.parentNode)document.head.appendChild(el);}
  }

  function update(path,val){
    setCfg(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      const parts=path.split('.');
      let cur=n;
      for(let i=0;i<parts.length-1;i++) cur=cur[parts[i]];
      cur[parts[parts.length-1]]=val;
      applyDesign(n);
      return n;
    });
  }

  async function save(){
    setSaving(true);
    try{
      await PUT('/design',cfg);
      setSaved(true);setTimeout(()=>setSaved(false),2000);
      if(onSave) onSave(cfg);
    }catch(e){alert('Save failed: '+e.message);}
    setSaving(false);
  }

  if(!cfg) return React.createElement('div',{className:'design-panel'},React.createElement('div',{style:{padding:24,textAlign:'center',color:'var(--text3)'}},React.createElement('div',{className:'spinner'})));

  const TABS=[['colors',t.colors],['content',t.content],['sections',t.sections],['typography',t.typography]];

  function ColorRow({label,path,val}){
    return React.createElement('div',{className:'design-row'},
      React.createElement('span',{className:'design-label'},label),
      React.createElement('div',{className:'color-input-wrap'},
        React.createElement('div',{className:'color-swatch',style:{background:val}}),
        React.createElement('input',{type:'color',value:val,onChange:e=>update(path,e.target.value)})
      )
    );
  }

  return React.createElement('div',{className:'design-panel'},
    React.createElement('div',{className:'design-panel-header'},
      React.createElement('span',{className:'design-panel-title'},t.designPanel),
      React.createElement('button',{onClick:onClose,style:{background:'none',border:'none',color:'var(--text3)',fontSize:20,cursor:'pointer',lineHeight:1}},'×')
    ),
    React.createElement('div',{className:'design-panel-body'},
      React.createElement('div',{className:'design-tabs'},
        TABS.map(([key,label])=>React.createElement('button',{key,className:'design-tab'+(tab===key?' active':''),onClick:()=>setTab(key)},label))
      ),
      tab==='colors'&&cfg.colors&&React.createElement('div',null,
        React.createElement('div',{className:'design-section-title'},t.colors),
        React.createElement(ColorRow,{label:t.primaryColor,path:'colors.primary',val:cfg.colors.primary}),
        React.createElement(ColorRow,{label:t.accentColor,path:'colors.accent',val:cfg.colors.accent}),
        React.createElement(ColorRow,{label:t.goldColor,path:'colors.gold',val:cfg.colors.gold}),
        React.createElement(ColorRow,{label:t.bgColor,path:'colors.bg',val:cfg.colors.bg}),
        React.createElement(ColorRow,{label:t.textColor,path:'colors.text',val:cfg.colors.text}),
        React.createElement('div',{style:{marginTop:16}},
          React.createElement('div',{className:'design-section-title'},'Quick Presets'),
          React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},
            [['🔥 Fire','#FF2D55','#FF6B2B','#FFD700','#070707','#e8e8e8'],
             ['💙 Ocean','#0099FF','#00D4FF','#00FFCC','#05080d','#e8ecf0'],
             ['💚 Matrix','#00FF41','#39FF14','#FFFF00','#000400','#e0ffe0'],
             ['🟣 Purple','#9B59B6','#E056FD','#FFD700','#080510','#f0e8ff']].map(([label,p,a,g,bg,tx])=>
              React.createElement('button',{key:label,onClick:()=>{const n={...cfg,colors:{primary:p,accent:a,gold:g,bg,text:tx}};setCfg(n);applyDesign(n);},style:{background:'var(--bg4)',border:'1px solid var(--border)',color:'var(--text)',fontSize:11,fontWeight:700,padding:'6px 8px',borderRadius:4,cursor:'pointer',transition:'all .2s',letterSpacing:.5}},label)
            )
          )
        )
      ),
      tab==='content'&&React.createElement('div',null,
        React.createElement('div',{className:'design-section-title'},'Hero'),
        React.createElement('div',{className:'form-group',style:{marginBottom:12}},
          React.createElement('label',{style:{fontSize:10,color:'var(--text3)',marginBottom:4}},'TITLE LINE 1'),
          React.createElement('input',{className:'design-input',value:cfg.heroTitle1||'',onChange:e=>update('heroTitle1',e.target.value)})
        ),
        React.createElement('div',{className:'form-group',style:{marginBottom:12}},
          React.createElement('label',{style:{fontSize:10,color:'var(--text3)',marginBottom:4}},'TITLE LINE 2'),
          React.createElement('input',{className:'design-input',value:cfg.heroTitle2||'',onChange:e=>update('heroTitle2',e.target.value)})
        ),
        React.createElement('div',{className:'form-group',style:{marginBottom:16}},
          React.createElement('label',{style:{fontSize:10,color:'var(--text3)',marginBottom:4}},'SUBTITLE'),
          React.createElement('textarea',{className:'design-textarea',value:cfg.heroSubtitle||'',onChange:e=>update('heroSubtitle',e.target.value)})
        ),
        React.createElement('div',{className:'design-section-title'},'Footer & Branding'),
        React.createElement('div',{className:'form-group',style:{marginBottom:12}},
          React.createElement('label',{style:{fontSize:10,color:'var(--text3)',marginBottom:4}},'FOOTER TEXT'),
          React.createElement('input',{className:'design-input',value:cfg.footerText||'',onChange:e=>update('footerText',e.target.value)})
        )
      ),
      tab==='sections'&&cfg.sections&&React.createElement('div',null,
        React.createElement('div',{className:'design-section-title'},t.sections),
        ...[['hero',t.showHero],['statBar',t.showStats],['battles',t.showBattles],['rappers',t.showRappers],['news',t.showNews]].map(([key,label])=>
          React.createElement('div',{key,className:'design-toggle-row'},
            React.createElement('span',{className:'design-label'},label),
            React.createElement('label',{className:'toggle'},
              React.createElement('input',{type:'checkbox',checked:!!cfg.sections[key],onChange:e=>update('sections.'+key,e.target.checked)}),
              React.createElement('span',{className:'slider'})
            )
          )
        )
      ),
      tab==='typography'&&React.createElement('div',null,
        React.createElement('div',{className:'design-section-title'},'Custom CSS'),
        React.createElement('p',{style:{fontSize:11,color:'var(--text3)',marginBottom:8}},'Add custom CSS to override any styles. Applied globally.'),
        React.createElement('textarea',{className:'design-textarea',style:{minHeight:200,fontFamily:'monospace',fontSize:11},value:cfg.customCSS||'',onChange:e=>update('customCSS',e.target.value),placeholder:'/* your custom css here */\n.navbar { ... }\n.hero { ... }'})
      )
    ),
    React.createElement('div',{className:'design-panel-footer'},
      React.createElement('button',{className:'btn-save-design',onClick:save,disabled:saving},saving?'Saving...':t.saveDesign),
    ),
    saved&&React.createElement('div',{className:'design-success',style:{padding:'0 12px 8px'}},t.designSaved)
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState('en');
  const t=T[lang];
  const [page,setPage]=useState('home');
  const [pageId,setPageId]=useState(null);
  const [currentUser,setCurrentUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [settings,setSettings]=useState({maintenanceMode:false,registrationOpen:true,chatEnabled:true,siteName:'Flow & Bars',seasonText:'Season 3'});
  const [designMode,setDesignMode]=useState(false);
  const [designConfig,setDesignConfig]=useState(null);

  useEffect(()=>{
    const token=getToken();
    if(token){
      GET('/auth/me').then(u=>setCurrentUser(u)).catch(()=>setToken(null)).finally(()=>setAuthLoading(false));
    } else { setAuthLoading(false); }
    GET('/settings').then(setSettings).catch(()=>{});
    GET('/design').then(d=>{setDesignConfig(d);applyDesign(d);}).catch(()=>{});
  },[]);

  function applyDesign(d){
    if(!d||!d.colors) return;
    const s=document.getElementById('design-vars');
    if(s) s.textContent=`:root{--red:${d.colors.primary};--red2:${d.colors.primary};--cyan:${d.colors.accent};--gold:${d.colors.gold};--bg:${d.colors.bg};--text:${d.colors.text};--bg2:#0d0d0d;--bg3:#111;--bg4:#161616;--bg5:#1c1c1c;--border:#222;--border2:#2a2a2a;--text2:#aaa;--text3:#666;--orange:#FF6B2B;--purple:#B44FFF;--green:#00FF87;--font-display:'Bebas Neue',cursive;--font-ui:'Rajdhani',sans-serif;--font-mono:'Share Tech Mono',monospace;}`;
  }

  useEffect(()=>{
    if(designMode) document.body.classList.add('design-mode');
    else document.body.classList.remove('design-mode');
  },[designMode]);

  const nav=(p,id=null)=>{setPage(p);setPageId(id);window.scrollTo(0,0);};
  const logout=()=>{setToken(null);setCurrentUser(null);nav('home');};

  if(authLoading) return React.createElement('div',{style:{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}},React.createElement('div',{className:'spinner'}));

  if(settings.maintenanceMode&&currentUser?.role!=='admin'){
    return React.createElement('div',{className:'maintenance'},
      React.createElement('h1',null,t.maintenance),
      React.createElement('p',{style:{color:'var(--text2)',fontSize:16}},t.maintenanceMsg),
      React.createElement('button',{className:'btn-primary btn-sm mt-8',onClick:()=>nav('login')},t.login)
    );
  }

  const props={t,lang,setLang,page,nav,pageId,currentUser,setCurrentUser,logout,settings,setSettings,designConfig,designMode};

  return React.createElement('div',{id:'app'},
    React.createElement(Navbar,{...props,onToggleDesign:()=>setDesignMode(m=>!m)}),
    React.createElement('main',null,
